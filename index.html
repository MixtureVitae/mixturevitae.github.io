<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MixtureVitae</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #fafafa;
      color: #222;
      line-height: 1.7;
      padding: 3rem 1.5rem;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2rem;
      font-weight: normal;
      margin-bottom: 0.5rem;
    }
    .venue {
      color: #666;
      font-style: italic;
      margin-bottom: 2rem;
    }
    .authors {
      margin-bottom: 2rem;
      font-size: 1.05rem;
    }
    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.4rem;
    }
    .citation-block {
      background: #f0f0f0;
      border-left: 3px solid #999;
      padding: 1rem 1.25rem;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 2px;
    }
    .links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .links a {
      display: inline-block;
      padding: 0.4rem 1rem;
      border: 1px solid #bbb;
      border-radius: 4px;
      text-decoration: none;
      color: #333;
      font-size: 0.9rem;
      font-family: sans-serif;
      transition: background 0.15s;
    }
    .links a:hover { background: #e8e8e8; }
    hr { border: none; border-top: 1px solid #ddd; margin: 2rem 0; }
  </style>
</head>
<body>
  <div class="container">

    <h1>MixtureVitae</h1>
    <p class="venue">Preprint, 2026</p>

    <p class="authors">
      <!-- TODO: add author names -->
    </p>

    <div class="links">
      <a href="#">Paper (PDF)</a>
      <a href="#">arXiv</a>
      <a href="#">Code</a>
    </div>

    <hr />

    <p class="section-title">Citation</p>
    <pre class="citation-block">@article{mixturevitae2026,
  title   = {MixtureVitae},
  author  = {},
  journal = {},
  year    = {2026},
  url     = {https://mixturevitae.github.io}
}</pre>

  </div>
</body>
</html>
